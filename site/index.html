<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suhan Son - CV</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      box-sizing: border-box;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
    }

    .actions a {
      display: inline-block;
      margin-left: 10px;
      padding: 8px 12px;
      text-decoration: none;
      border: 1px solid #333;
      border-radius: 6px;
      color: #111;
      background: white;
    }

    .viewer-wrap {
      width: 100%;
      height: calc(100vh - 61px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Suhan Son - Curriculum Vitae</div>
    <div class="actions">
      <a href="./cv.pdf" target="_blank">Open PDF</a>
      <a href="./cv.pdf" download>Download</a>
    </div>
  </div>

  <div class="viewer-wrap">
    <iframe src="./cv.pdf"></iframe>
  </div>
</body>
</html>
